name: Update Agent Skill Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate skills
        run: python3 scripts/validate.py

      - name: Build registry
        run: python3 scripts/build_registry.py

      - name: Deploy to registry-deploy
        env:
          GH_TOKEN: ${{ secrets.PRESTO_PAT }}
        run: |
          test -f output/deploy/registry.json
          git_auth_config=(
            -c credential.helper=
            -c 'credential.https://github.com.helper=!f() { echo username=x-access-token; echo password=$GH_TOKEN; }; f'
          )
          git "${git_auth_config[@]}" clone https://github.com/Presto-io/registry-deploy.git /tmp/deploy
          rm -rf /tmp/deploy/agent-skills
          mkdir -p /tmp/deploy/agent-skills
          cp output/deploy/registry.json /tmp/deploy/agent-skills/registry.json
          cd /tmp/deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agent-skills/
          if git diff --cached --quiet; then
            echo "No changes to agent skill registry"
            exit 0
          fi
          git commit -m "chore: update agent skill registry"
          git "${git_auth_config[@]}" push
